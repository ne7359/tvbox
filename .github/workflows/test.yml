name: зј–иҜ‘DiyTVBox

on:
  workflow_dispatch:
    inputs:
      android_arm64:
        description: 'жү“еӢҫвң…ж·»еҠ arm64ж”ҜжҢҒдёҚж”ҜжҢҒijkи§Јз Ғ'
        required: false
        type: boolean
      android_x86:
        description: 'жү“еӢҫвң…ж·»еҠ android for PC x86ж”ҜжҢҒ'
        required: false
        type: boolean
      add_py:
        description: 'жү“еӢҫвң…ж·»еҠ PYж”ҜжҢҒ'
        required: false
        type: boolean
      source_branch:
        description: "йҖүжӢ©TVBoxжәҗеҲҶж”Ҝ"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99
          - mlabalabala

jobs:
  build:
    runs-on: ubuntu-latest
    name: зј–иҜ‘ ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: и®ҫзҪ® DIY
        working-directory: ${{ github.workspace }}
        run: |
         chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
         source TVBox/${{ inputs.source_branch }}/diy.sh

      - name: жӢүеҸ–жәҗе№¶дҝ®ж”№жәҗд»Јз Ғ
        working-directory: ${{ github.workspace }}
        run: |
          git clone -b main --depth=1 ${{ env.sourceURL }} TVBoxOSC
          chmod +x ./TVBoxOSC
          if [ -f "./TVBoxOSC/app/build.gradle" ]; then
            (
              source ./custom.sh
            )
          fi
          sed -i "/android:text=/s#=\"#=\"зүҲжң¬еҸ·: ${{ env.diy_TIME }}\\\\n\\\\n#" TVBoxOSC/app/src/main/res/layout/dialog_about.xml
          sed -i "/versionName/s#[0-9a-zA-Z_\.\'\"-]\+\$#\'зүҲжң¬еҸ·: ${{ env.diy_TIME }}\'#" TVBoxOSC/app/build.gradle

      #- name: еҺӢзј© дҝ®ж”№еҗҺзҡ„жәҗд»Јз Ғ
      #  working-directory: TVBoxOSC
      #  run: |
      #    tar -cJf DIYsource.tar.xz --exclude=.git --exclude=.github *

      - name: ж·»еҠ  arm64-v8a ж”ҜжҢҒ
        if: ${{ inputs.android_arm64 }}
        working-directory: ${{ github.workspace }}
        run: |
          source ./arm64-v8a.sh

      - name: ж·»еҠ  x86 ж”ҜжҢҒ
        if: ${{ inputs.android_x86 }}
        working-directory: ${{ github.workspace }}
        run: |
          source ./add-X86.sh

      - name: ж·»еҠ  PY ж”ҜжҢҒ
        if: ${{ inputs.add_py }}
        working-directory: ${{ github.workspace }}
        run: |         
          source ./add-py.sh

      - name: з»ҷиҪҜд»¶зӯҫеҗҚ
        working-directory: ${{ github.workspace }}
        run: |         
          source ./ApkSign.sh

      #- name: Setup JDK
      #  uses: actions/setup-java@v4
      #  with:
      #    distribution: temurin
      #    java-version: ${{ env.javaVersion }} #з”ЁдәҺиҮӘе®ҡд№үзүҲжң¬пјҢдҝ®ж”№diy.sh еҸҳйҮҸjavaVersion=зүҲжң¬еҸ·
      - name: жЈҖжҹҘJAVAзүҲжң¬ е®үиЈ…JDK
        working-directory: TVBoxOSC
        run: |
          setup_java_ver=$(grep -o 'JavaVersion.VERSION_[0-9_]\+' app/build.gradle |head -1 |sed 's/.*_//')
          if [ $setup_java_ver -gt 11 ]; then
            echo "setup_java_ver=$setup_java_ver" >> $GITHUB_ENV
          fi
      - uses: actions/setup-java@v4
        if: ${{ env.setup_java_ver }}
        with:
          distribution: temurin
          java-version: ${{ env.setup_java_ver }}

      - name: е®үиЈ… Gradle
        uses: gradle/gradle-build-action@v3

      - name: дҪҝз”Ё Gradle жһ„е»ә
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: еҮҶеӨҮеә”з”ЁзЁӢеәҸ
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          #for file in `find ~ -name "*release*.apk" -print`; do
          for file in `find ~ -name "*.apk" -print`; do
            mv "$file" apk/QTM-${{ env.sourceName }}.apk
          done

      - name: дёҠдј  APK еҲ° Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTMеҪұи§Ҷ
          tag: ${{ env.tag }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            вҳ… жәҗз ҒеҲҶж”Ҝпјҡ${{ inputs.source_branch }}
            
            рҹҺҲ зј–иҜ‘ж—¶й—ҙпјҡ${{ env.tag }}

          artifacts: |
            TVBoxOSC/apk/*.apk

      - name: Upload to 123зҪ‘зӣҳ
        run: |
          # дҪҝз”Ёcurlе‘Ҫд»Өе°Ҷзј–иҜ‘еҘҪзҡ„зЁӢеәҸеҸ‘йҖҒеҲ°123зҪ‘зӣҳ
          curl -T TVBoxOSC/apk/*.apk https://www.123pan.com/upload
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
