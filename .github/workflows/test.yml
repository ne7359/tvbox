name: 编译DIYTVBox

on:
  workflow_dispatch:
    inputs:
      android_arm64:
        description: '打勾✅添加arm64支持不支持ijk解码'
        required: false
        type: boolean
      android_x86:
        description: '打勾✅添加android for PC x86支持'
        required: false
        type: boolean
      add_py:
        description: '打勾✅添加PY支持'
        required: false
        type: boolean
      source_branch:
        description: "选择TVBox源分支"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99

jobs:
  build:
    runs-on: ubuntu-latest
    name: 编译 ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 设置 DIY
        working-directory: ${{ github.workspace }}
        run: |
         chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
         source TVBox/${{ inputs.source_branch }}/diy.sh

      - name: 拉取源并修改源代码
        working-directory: ${{ github.workspace }}
        run: |
          git clone -b main --depth=1 ${{ env.sourceURL }} TVBoxOSC
          chmod +x ./TVBoxOSC
          if [ -f "./TVBoxOSC/app/build.gradle" ]; then
            (
              source ./config.sh
            )
          fi 
          echo "tag=$(git log --date=format:'%Y.%m.%d-%H.%M' -1 --pretty=format:%cd)" >> $GITHUB_ENV
          # echo "tag=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV   # 添加编译时间
          echo '生成日期完成'

      - name: 压缩并修改的源代码
        working-directory: TVBoxOSC
        run: |
          tar -cJf source-${{ env.tag }}.tar.xz --exclude=.git --exclude=.github *
          cd

      - name: 添加 arm64-v8a 支持
        if: ${{ inputs.android_arm64 }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x TVBox/${{ inputs.source_branch }}/Add-arm64.sh
          source TVBox/${{ inputs.source_branch }}/Add-arm64.sh

      - name: 添加 x86 支持
        if: ${{ inputs.android_x86 }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x TVBox/${{ inputs.source_branch }}/Add-X86.sh
          source TVBox/${{ inputs.source_branch }}/Add-X86.sh

      - name: 添加 PY 支持
        if: ${{ inputs.add_py }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x TVBox/${{ inputs.source_branch }}/Add-PY.sh
          source TVBox/${{ inputs.source_branch }}/Add-PY.sh

      #- name: Setup JDK
      #  uses: actions/setup-java@v4
      #  with:
      #    distribution: temurin
      #    java-version: ${{ env.javaVersion }}
      - name: 检查JAVA版本 安装JDK
        working-directory: TVBoxOSC
        run: |
          setup_java_ver=$(grep -o 'JavaVersion.VERSION_[0-9_]\+' app/build.gradle |head -1 |sed 's/.*_//')
          if [ $setup_java_ver -gt 11 ]; then
            echo "setup_java_ver=$setup_java_ver" >> $GITHUB_ENV
          fi
      - uses: actions/setup-java@v4
        if: ${{ env.setup_java_ver }}
        with:
          distribution: temurin
          java-version: ${{ env.setup_java_ver }}

      - name: 安装 Gradle
        uses: gradle/gradle-build-action@v3

      - name: 使用 Gradle 构建
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: 准备应用程序
        working-directory: TVBoxOSC
        run: |
          export LANG="zh_CN.UTF-8
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            mv "$file" apk/QTM影视-${{ env.sourceName }}.apk
          done

      - name: 上传 APK 到 Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTM影视
          tag: ${{ env.tag }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            ★ 源码分支：${{ inputs.source_branch }}
            
            🎈 编译时间：${{ env.tag }}

          artifacts: |
            TVBoxOSC/apk/*.apk
            TVBoxOSC/source-${{ env.tag }}.*
