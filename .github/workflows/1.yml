name: зј–иҜ‘Diy
on:
  workflow_dispatch:
    inputs:
      android_arm64:
        description: 'жү“еӢҫвң…ж·»еҠ arm64ж”ҜжҢҒдёҚж”ҜжҢҒijkи§Јз Ғ'
        required: false
        type: boolean
      android_x86:
        description: 'жү“еӢҫвң…ж·»еҠ android for PC x86ж”ҜжҢҒ'
        required: false
        type: boolean
      add_py:
        description: 'жү“еӢҫвң…ж·»еҠ PYж”ҜжҢҒ'
        required: false
        type: boolean
      source_branch:
        description: "йҖүжӢ©TVBoxжәҗеҲҶж”Ҝ"
        required: false
        default: "дҝҠзүҲ"
        type: choice
        options:
          - q215613905
          - дҝҠзүҲ
          - mlabalabala

jobs:
  build:
    runs-on: ubuntu-latest
    name: зј–иҜ‘ ${{ inputs.source_branch }}

    steps:
      - name: иҜ»еҸ–д»“еә“ж–Үд»¶еҲ° ${{ github.workspace }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: и®ҫзҪ® DIY
        working-directory: ${{ github.workspace }}
        run: |
         chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
         source TVBox/${{ inputs.source_branch }}/diy.sh

      - name: жӢүеҸ–жәҗе№¶дҝ®ж”№жәҗд»Јз Ғ
        working-directory: ${{ github.workspace }}
        run: |
          git clone -b main --depth=1 ${{ env.sourceURL }} TVBoxOSC
          chmod +x ./TVBoxOSC
          if [[ -f "./TVBoxOSC/app/build.gradle" && -f "./custom.sh" ]]; then
            chmod +x ./custom.sh
            ./custom.sh
          else
            echo "жЈҖжҹҘcustom.shж–Үд»¶дёҚеӯҳеңЁ."
          fi
      - name: з»ҷиҪҜд»¶зӯҫеҗҚ
        working-directory: ${{ github.workspace }}
        run: |         
          source ./ApkSign.sh
          echo cat'dialog_about.xml'
