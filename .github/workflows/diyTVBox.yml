name: зј–иЇ‘TVBox-APK

on:
  workflow_dispatch:
    inputs:
      testOption:
        description: 'ж‰“е‹ѕвњ…ж·»еЉ arm64ж”ЇжЊЃдёЌж”ЇжЊЃijkи§Јз Ѓ'
        required: false
        type: boolean
      add_to_py:
        description: 'ж‰“е‹ѕвњ…ж·»еЉ PYж”ЇжЊЃ'
        required: false
        type: boolean
      source_branch:
        description: "йЂ‰ж‹©TVBoxжєђе€†ж”Ї"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99

jobs:
  build:
    runs-on: ubuntu-latest
    name: зј–иЇ‘ ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Clone project
        run: |
          git clone https://github.com/ne7359/tvbox.git diyTVBOX

      - name: diyTVBOX
        run: |
          cd diyTVBOX
          chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
          source TVBox/${{ inputs.source_branch }}/diy.sh
          source ./config.sh
          cd TVBoxOSC
          echo PWD=$PWD >> $GITHUB_ENV

      - name: жµ‹иЇ•йЂ‰йЎ№
        if: ${{ inputs.testOption }}
        working-directory: $PWD
        run: |
          #ж·»еЉ arm64ж”ЇжЊЃпјЊдёЌж”ЇжЊЃijkи§Јз Ѓ
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" app/build.gradle
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" player/build.gradle
          cd

      - uses: gradle/gradle-build-action@v2

      - name: дЅїз”Ё Gradle жћ„е»є
        working-directory: $PWD
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode alll

      - name: ж·»еЉ зј–иЇ‘ж—¶й—ґ
        working-directory: $PWD
        run: |
            echo "FILE_TIME=$(date "+%Yе№ґ%mжњ€%dж—Ґ-%Hз‚№%Mе€†")" >> $GITHUB_ENV

      - name: е‡†е¤‡еє”з”ЁзЁ‹еєЏ
        working-directory: $PWD
        run: |
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            mv "$file" apk/QTMTv.apk
          done

      - name: дёЉдј  APK е€° Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTMеЅ±и§†
          tag: ${{ env.FILE_TIME }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            зј–иЇ‘жєђпјљ${{ inputs.source_branch }}
            рџЋ€ зј–иЇ‘ж—¶й—ґпјљ${{ env.FILE_TIME }}
            вЏ° зј–иЇ‘з”Ёж—¶пјљ${{ env.BUILD_TIME }}
          artifacts: |
            TVBoxOSC/apk/*.apk
