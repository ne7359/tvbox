name: зј–иҜ‘TVBox-APK

on:
  workflow_dispatch:
    inputs:
      testOption:
        description: 'жү“еӢҫвң…ж·»еҠ arm64ж”ҜжҢҒдёҚж”ҜжҢҒijkи§Јз Ғ'
        required: false
        type: boolean
      add_to_py:
        description: 'жү“еӢҫвң…ж·»еҠ PYж”ҜжҢҒ'
        required: false
        type: boolean
      source_branch:
        description: "йҖүжӢ©TVBoxжәҗеҲҶж”Ҝ"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99

jobs:
  build:
    runs-on: ubuntu-latest
    name: зј–иҜ‘ ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: иҺ·еҸ– DIY й…ҚзҪ®
        run: |
          git clone https://github.com/ne7359/tvbox.git diyTVBOX

      - name: жӣҙж”№жәҗд»Јз Ғ
        run: |
          cd diyTVBOX
          chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
          source TVBox/${{ inputs.source_branch }}/diy.sh
          source ./config.sh
          cd

      - name: жөӢиҜ•йҖүйЎ№
        if: ${{ inputs.testOption }}
        working-directory: diyTVBOX/TVBoxOSC
        run: |
          #ж·»еҠ arm64ж”ҜжҢҒпјҢдёҚж”ҜжҢҒijkи§Јз Ғ
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" app/build.gradle
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" player/build.gradle
          
      - name: е®үиЈ… Gradle
        uses: gradle/gradle-build-action@v3

      - name: дҪҝз”Ё Gradle жһ„е»ә
        working-directory: diyTVBOX/TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: ж·»еҠ зј–иҜ‘ж—¶й—ҙ
        working-directory: diyTVBOX/TVBoxOSC
        run: |
            echo "FILE_TIME=$(date "+%Yе№ҙ%mжңҲ%dж—Ҙ-%HзӮ№%MеҲҶ")" >> $GITHUB_ENV

      - name: еҮҶеӨҮеә”з”ЁзЁӢеәҸ
        working-directory: diyTVBOX/TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            mv "$file" apk/QTMеҪұи§Ҷ.apk
          done

      - name: дёҠдј  APK еҲ° Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTMеҪұи§Ҷ
          tag: ${{ env.FILE_TIME }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            зј–иҜ‘жәҗз Ғпјҡ${{ inputs.source_branch }}
            рҹҺҲ зј–иҜ‘ж—¶й—ҙпјҡ${{ env.FILE_TIME }}
          artifacts: |
            diyTVBOX/TVBoxOSC/apk/*.apk
