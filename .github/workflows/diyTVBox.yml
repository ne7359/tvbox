name: зә–иҮ‘TVBox-APK

on:
  workflow_dispatch:
    inputs:
      testOption:
        description: 'ж‰“е‹ңвњ…ж·»еЉ arm64ж”ҮжЊЃдёҚж”ҮжЊЃijkи§Әз Ѓ'
        required: false
        type: boolean
      add_to_py:
        description: 'ж‰“е‹ңвњ…ж·»еЉ PYж”ҮжЊЃ'
        required: false
        type: boolean
      source_branch:
        description: "йЂ‰ж‹©TVBoxжғђе€†ж”Ү"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99

jobs:
  build:
    runs-on: ubuntu-latest
    name: зә–иҮ‘ ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: ж‹‰еЏ– DIY ж–‡д»¶
        run: |
          git clone https://github.com/ne7359/tvbox.git diyTVBOX

      - name: иүђиҰЊ DIY
        run: |
          cd diyTVBOX
          chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
          source TVBox/${{ inputs.source_branch }}/diy.sh
          source ./config.sh
          cd TVBoxOSC

      - name: жµ‹иҮ•йЂ‰йҰ№
        if: ${{ inputs.testOption }}
        working-directory: TVBoxOSC
        run: |
          #ж·»еЉ arm64ж”ҮжЊЃпәЊдёҚж”ҮжЊЃijkи§Әз Ѓ
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" app/build.gradle
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" player/build.gradle

      - name: жӘЂжџӨJAVAз‰€жњ¬
        working-directory: TVBoxOSC
        run: |
          setup_java_ver=$(grep -o 'JavaVersion.VERSION_[0-9_]\+' app/build.gradle |head -1 |sed 's/.*_//')
          if [ $setup_java_ver -gt 11 ]; then
            echo "setup_java_ver=$setup_java_ver" >> $GITHUB_ENV
          fi
      - uses: actions/setup-java@v4
        if: ${{ env.setup_java_ver }}
        with:
          distribution: temurin
          java-version: ${{ env.setup_java_ver }}
      - uses: gradle/gradle-build-action@v2
        if: ${{ env.commit }}

      - name: дҢүз”Ё Gradle жһ„е»ғ
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: ж·»еЉ зә–иҮ‘ж—¶й—ө
        run: |
            echo "FILE_TIME=$(date "+%Yе№ө%mжњ€%dж—Ө-%Hз‚№%Mе€†")" >> $GITHUB_ENV

      - name: е‡†е¤‡еғ”з”ЁзЁ‹еғЏ
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            mv "$file" apk/QTMTv.apk
          done

      - name: дёЉдә  APK е€° Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTMеҢ±и§†
          tag: ${{ env.FILE_TIME }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            зә–иҮ‘жғђпәљ${{ inputs.source_branch }}
            рџҺ€ зә–иҮ‘ж—¶й—өпәљ${{ env.FILE_TIME }}
            вЏ° зә–иҮ‘з”Ёж—¶пәљ${{ env.BUILD_TIME }}
          artifacts: |
            TVBoxOSC/apk/*.apk
