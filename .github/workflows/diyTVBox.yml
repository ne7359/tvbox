name: 编译TVBox-APK

on:
  workflow_dispatch:
    inputs:
      testOption:
        description: '打勾✅添加arm64支持不支持ijk解码'
        required: false
        type: boolean
      add_to_py:
        description: '打勾✅添加PY支持'
        required: false
        type: boolean
      source_branch:
        description: "选择TVBox源分支"
        required: false
        default: "q215613905"
        type: choice
        options:
          - q215613905
          - takagen99

jobs:
  build:
    runs-on: ubuntu-latest
    name: 编译 ${{ inputs.source_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: 拉取 DIY 文件
        run: |
          git clone https://github.com/ne7359/tvbox.git diyTVBOX

      - name: 运行 DIY
        run: |
          cd diyTVBOX
          chmod +x TVBox/${{ inputs.source_branch }}/diy.sh
          source TVBox/${{ inputs.source_branch }}/diy.sh
          source ./config.sh
          cd

      - name: 测试选项
        if: ${{ inputs.testOption }}
        run: |
          cd diyTVBOX/TVBoxOSC
          #添加arm64支持，不支持ijk解码
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" app/build.gradle
          sed -i "/armeabi-v7a[\'\"]$/s#\$#, 'arm64-v8a'#" player/build.gradle
          cd && 
          cd diyTVBOX/TVBoxOSC

      - name: 检查JAVA版本
        run: |
          setup_java_ver=$(grep -o 'JavaVersion.VERSION_[0-9_]\+' app/build.gradle |head -1 |sed 's/.*_//')
          if [ $setup_java_ver -gt 11 ]; then
            echo "setup_java_ver=$setup_java_ver" >> $GITHUB_ENV
          fi
      - uses: actions/setup-java@v4
        if: ${{ env.setup_java_ver }}
        with:
          distribution: temurin
          java-version: ${{ env.setup_java_ver }}
      - uses: gradle/gradle-build-action@v2

      - name: 使用 Gradle 构建
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: 添加编译时间
        run: |
            echo "FILE_TIME=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV

      - name: 准备应用程序
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          for file in `find ~ -name "*release*.apk" -print`; do
            mv "$file" apk/QTMTv.apk
          done

      - name: 上传 APK 到 Release
        uses: ncipollo/release-action@main
        env:
           GITHUB_TOKEN: ${{ secrets.GIT_USER_TOKEN }}
        with:
          name: QTM影视
          tag: ${{ env.FILE_TIME }}
          allowUpdates: true
          removeArtifacts: true
          body: |
            编译源：${{ inputs.source_branch }}
            🎈 编译时间：${{ env.FILE_TIME }}
            ⏰ 编译用时：${{ env.BUILD_TIME }}
          artifacts: |
            TVBoxOSC/apk/*.apk
